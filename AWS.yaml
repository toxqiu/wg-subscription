proxies:
  - name: AWS-HY2
    type: hysteria2
    server: toxqiu.ccwu.cc      # 你的域名
    port: 2053                    # Hysteria2 端口
    password: 8zPJSHleGlmXaDFsm2FPKPJP
    sni: toxqiu.ccwu.cc         # 与证书一致
    skip-cert-verify: true      # 避免证书问题
